<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Šachový turnaj — každý s každým</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --board-dark:#2b1d14;
    --board-darker:#1c130d;
    --board-light:#f2ead9;
    --felt:#22352b;
    --felt-light:#2f4a3c;
    --gold:#b8935f;
    --gold-bright:#d9b579;
    --ivory:#f2ead9;
    --loss:#7a3b3b;
    --win:#3b6b52;
    --draw:#8a7a4e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--board-darker);
    background-image:
      linear-gradient(135deg, rgba(184,147,95,0.05) 25%, transparent 25%),
      linear-gradient(225deg, rgba(184,147,95,0.05) 25%, transparent 25%);
    background-size:60px 60px;
    color:var(--ivory);
    font-family:'IBM Plex Mono', monospace;
    min-height:100vh;
  }
  .wrap{max-width:920px;margin:0 auto;padding:32px 20px 80px;}
  header{
    text-align:center;
    margin-bottom:36px;
    border-bottom:1px solid rgba(184,147,95,0.3);
    padding-bottom:24px;
  }
  .kicker{
    letter-spacing:0.25em;
    text-transform:uppercase;
    font-size:11px;
    color:var(--gold);
    margin-bottom:10px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:clamp(28px,5vw,42px);
    margin:0;
    letter-spacing:0.01em;
  }
  h1 .sq{color:var(--gold-bright);}
  .subtitle{color:#b8a98f;font-size:13px;margin-top:10px;}

  .panel{
    background:linear-gradient(180deg, var(--felt-light), var(--felt));
    border:1px solid rgba(184,147,95,0.25);
    border-radius:10px;
    padding:22px 24px;
    margin-bottom:24px;
    box-shadow:0 8px 24px rgba(0,0,0,0.35);
  }
  .panel h2{
    font-family:'Fraunces', serif;
    font-size:20px;
    margin:0 0 16px;
    color:var(--gold-bright);
    display:flex;
    align-items:center;
    gap:10px;
  }
  .panel h2::before{
    content:"";
    width:10px;height:10px;
    background:var(--gold);
    display:inline-block;
    transform:rotate(45deg);
  }

  .player-input-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  input[type=text]{
    flex:1;min-width:180px;
    background:var(--board-darker);
    border:1px solid rgba(184,147,95,0.4);
    color:var(--ivory);
    padding:11px 14px;
    border-radius:6px;
    font-family:'IBM Plex Mono', monospace;
    font-size:14px;
  }
  input[type=text]:focus{outline:none;border-color:var(--gold-bright);}
  button{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size:13px;
    letter-spacing:0.03em;
    cursor:pointer;
    border-radius:6px;
    border:1px solid transparent;
    padding:11px 18px;
    transition:transform .12s ease, filter .12s ease;
  }
  button:active{transform:scale(0.97);}
  .btn-gold{background:var(--gold);color:var(--board-darker);}
  .btn-gold:hover{filter:brightness(1.12);}
  .btn-ghost{background:transparent;border-color:rgba(184,147,95,0.5);color:var(--ivory);}
  .btn-ghost:hover{background:rgba(184,147,95,0.12);}
  .btn-danger{background:transparent;border-color:rgba(122,59,59,0.7);color:#e0a3a3;}
  .btn-danger:hover{background:rgba(122,59,59,0.2);}

  .player-list{list-style:none;padding:0;margin:0;display:flex;flex-wrap:wrap;gap:8px;}
  .player-chip{
    background:var(--board-darker);
    border:1px solid rgba(184,147,95,0.3);
    padding:7px 10px 7px 14px;
    border-radius:20px;
    display:flex;align-items:center;gap:8px;font-size:13px;
  }
  .player-chip button{
    background:none;border:none;color:#e0a3a3;padding:2px 6px;font-size:14px;line-height:1;
  }
  .empty-note{color:#8d8168;font-size:13px;font-style:italic;}

  .actions-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px;}

  .round-block{margin-bottom:22px;}
  .round-title{
    font-family:'Fraunces', serif;
    color:var(--gold-bright);
    font-size:16px;
    margin:0 0 10px;
    display:flex;align-items:center;gap:10px;
  }
  .round-title .num{
    background:var(--gold);color:var(--board-darker);
    font-family:'IBM Plex Mono',monospace;font-weight:600;
    font-size:12px;padding:2px 8px;border-radius:4px;
  }
  .match{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    gap:12px;
    background:var(--board-darker);
    border:1px solid rgba(184,147,95,0.2);
    border-radius:8px;
    padding:12px 16px;
    margin-bottom:8px;
  }
  .match.bye{grid-template-columns:1fr;text-align:center;color:#8d8168;font-style:italic;}
  .p-name{font-size:14px;}
  .p-name.left{text-align:right;}
  .p-name.right{text-align:left;}
  .result-buttons{display:flex;gap:6px;}
  .rbtn{
    padding:8px 10px;font-size:12px;min-width:44px;
    background:var(--board-dark);border:1px solid rgba(184,147,95,0.35);color:#b8a98f;
  }
  .rbtn:hover{border-color:var(--gold-bright);}
  .rbtn.active-win{background:var(--win);color:#fff;border-color:var(--win);}
  .rbtn.active-draw{background:var(--draw);color:#fff;border-color:var(--draw);}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid rgba(184,147,95,0.15);}
  th{color:var(--gold-bright);font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:0.05em;}
  tr:last-child td{border-bottom:none;}
  td.pts{font-weight:600;color:var(--gold-bright);font-family:'IBM Plex Mono',monospace;}
  .rank{color:#8d8168;width:28px;}
  .rank.gold{color:#d9b579;font-weight:700;}
  .rank.silver{color:#c9c9c9;font-weight:700;}
  .rank.bronze{color:#c98a5a;font-weight:700;}

  footer{text-align:center;color:#665a45;font-size:11px;margin-top:40px;}
  @media(max-width:520px){
    .match{grid-template-columns:1fr;text-align:center;gap:8px;}
    .p-name.left,.p-name.right{text-align:center;}
    .result-buttons{justify-content:center;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">Turnajový systém</div>
    <h1>Šach<span class="sq">•</span>Turnaj</h1>
    <div class="subtitle">Round robin — každý hráč s každým · body: výhra 1 · remíza ½ · prehra 0</div>
  </header>

  <div class="panel">
    <h2>Hráči</h2>
    <div class="player-input-row">
      <input type="text" id="playerNameInput" placeholder="Meno hráča" maxlength="40">
      <button class="btn-gold" id="addPlayerBtn">Pridať hráča</button>
    </div>
    <ul class="player-list" id="playerList"></ul>
    <div class="actions-row">
      <button class="btn-gold" id="generateBtn">Vygenerovať turnaj</button>
      <button class="btn-danger" id="resetBtn">Vynulovať všetko</button>
    </div>
  </div>

  <div class="panel" id="standingsPanel" style="display:none;">
    <h2>Poradie</h2>
    <table>
      <thead>
        <tr><th></th><th>Hráč</th><th>Z</th><th>V</th><th>R</th><th>P</th><th>Body</th></tr>
      </thead>
      <tbody id="standingsBody"></tbody>
    </table>
  </div>

  <div id="roundsContainer"></div>

  <footer>Dáta sa ukladajú lokálne v tomto prehliadači (localStorage).</footer>
</div>

<script>
const STORAGE_KEY = 'chess_tournament_state_v1';

let state = loadState() || { players: [], rounds: null };

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}
function uid(){ return 'p'+Math.random().toString(36).slice(2,9); }

function findPlayer(id){
  return state.players.find(p=>p.id===id);
}

// ---- Player management ----
function addPlayer(name){
  name = name.trim();
  if(!name) return;
  state.players.push({id: uid(), name});
  state.rounds = null; // invalidate schedule when roster changes
  saveState();
  render();
}
function removePlayer(id){
  state.players = state.players.filter(p=>p.id!==id);
  state.rounds = null;
  saveState();
  render();
}

// ---- Round robin generation (circle method) ----
function generateRounds(){
  if(state.players.length < 2) return;
  let arr = state.players.map(p=>p.id);
  const hasBye = arr.length % 2 !== 0;
  if(hasBye) arr.push(null);
  const n = arr.length;
  const roundsCount = n - 1;
  const rounds = [];
  let working = arr.slice();
  for(let r=0; r<roundsCount; r++){
    const pairs = [];
    for(let i=0; i<n/2; i++){
      const p1 = working[i];
      const p2 = working[n-1-i];
      pairs.push({p1, p2, result: null}); // result: 'p1' | 'draw' | 'p2' | null
    }
    rounds.push(pairs);
    // rotate all except position 0
    const fixed = working[0];
    const rest = working.slice(1);
    rest.unshift(rest.pop());
    working = [fixed, ...rest];
  }
  state.rounds = rounds;
  saveState();
  render();
}

function setResult(roundIdx, matchIdx, value){
  const match = state.rounds[roundIdx][matchIdx];
  match.result = (match.result === value) ? null : value;
  saveState();
  render();
}

function resetAll(){
  if(!confirm('Naozaj chceš vynulovať celý turnaj (hráčov aj výsledky)?')) return;
  state = { players: [], rounds: null };
  saveState();
  render();
}

// ---- Standings ----
function computeStandings(){
  const stats = {};
  state.players.forEach(p=>{
    stats[p.id] = {id:p.id, name:p.name, played:0, w:0, d:0, l:0, pts:0};
  });
  if(state.rounds){
    state.rounds.forEach(round=>{
      round.forEach(m=>{
        if(m.p2 === null){
          // bye — counts as a free win, does not count as "played" against an opponent
          if(m.p1 && stats[m.p1]){ stats[m.p1].pts += 1; }
          return;
        }
        if(!m.result) return;
        const s1 = stats[m.p1], s2 = stats[m.p2];
        if(!s1 || !s2) return;
        s1.played++; s2.played++;
        if(m.result === 'p1'){ s1.w++; s1.pts+=1; s2.l++; }
        else if(m.result === 'p2'){ s2.w++; s2.pts+=1; s1.l++; }
        else if(m.result === 'draw'){ s1.d++; s2.d++; s1.pts+=0.5; s2.pts+=0.5; }
      });
    });
  }
  return Object.values(stats).sort((a,b)=> b.pts - a.pts || b.w - a.w || a.name.localeCompare(b.name));
}

// ---- Rendering ----
function render(){
  renderPlayerList();
  renderStandings();
  renderRounds();
}

function renderPlayerList(){
  const ul = document.getElementById('playerList');
  ul.innerHTML = '';
  if(state.players.length === 0){
    ul.innerHTML = '<div class="empty-note">Zatiaľ žiadni hráči — pridaj aspoň dvoch.</div>';
    return;
  }
  state.players.forEach(p=>{
    const li = document.createElement('li');
    li.className = 'player-chip';
    li.innerHTML = `<span>${escapeHtml(p.name)}</span><button title="Odstrániť" data-id="${p.id}">✕</button>`;
    li.querySelector('button').addEventListener('click', ()=>removePlayer(p.id));
    ul.appendChild(li);
  });
}

function renderStandings(){
  const panel = document.getElementById('standingsPanel');
  const body = document.getElementById('standingsBody');
  if(!state.rounds || state.players.length === 0){
    panel.style.display = 'none';
    return;
  }
  panel.style.display = 'block';
  const standings = computeStandings();
  body.innerHTML = '';
  standings.forEach((s, idx)=>{
    const rankClass = idx===0?'gold':idx===1?'silver':idx===2?'bronze':'';
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="rank ${rankClass}">${idx+1}</td>
      <td>${escapeHtml(s.name)}</td>
      <td>${s.played}</td>
      <td>${s.w}</td>
      <td>${s.d}</td>
      <td>${s.l}</td>
      <td class="pts">${s.pts}</td>`;
    body.appendChild(tr);
  });
}

function renderRounds(){
  const container = document.getElementById('roundsContainer');
  container.innerHTML = '';
  if(!state.rounds) return;
  state.rounds.forEach((round, rIdx)=>{
    const block = document.createElement('div');
    block.className = 'round-block';
    const title = document.createElement('div');
    title.className = 'round-title';
    title.innerHTML = `<span class="num">Kolo ${rIdx+1}</span>`;
    block.appendChild(title);

    round.forEach((m, mIdx)=>{
      const div = document.createElement('div');
      if(m.p2 === null){
        div.className = 'match bye';
        div.textContent = `${findPlayer(m.p1)?.name ?? '?'} — voľno (1 bod)`;
      } else {
        div.className = 'match';
        const p1 = findPlayer(m.p1);
        const p2 = findPlayer(m.p2);
        div.innerHTML = `
          <div class="p-name left">${escapeHtml(p1?.name ?? '?')}</div>
          <div class="result-buttons">
            <button class="rbtn ${m.result==='p1'?'active-win':''}" data-v="p1">1</button>
            <button class="rbtn ${m.result==='draw'?'active-draw':''}" data-v="draw">½</button>
            <button class="rbtn ${m.result==='p2'?'active-win':''}" data-v="p2">1</button>
          </div>
          <div class="p-name right">${escapeHtml(p2?.name ?? '?')}</div>
        `;
        div.querySelectorAll('.rbtn').forEach(btn=>{
          btn.addEventListener('click', ()=> setResult(rIdx, mIdx, btn.dataset.v));
        });
      }
      block.appendChild(div);
    });
    container.appendChild(block);
  });
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ---- Event bindings ----
document.getElementById('addPlayerBtn').addEventListener('click', ()=>{
  const input = document.getElementById('playerNameInput');
  addPlayer(input.value);
  input.value = '';
  input.focus();
});
document.getElementById('playerNameInput').addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){
    e.preventDefault();
    document.getElementById('addPlayerBtn').click();
  }
});
document.getElementById('generateBtn').addEventListener('click', ()=>{
  if(state.players.length < 2){
    alert('Pridaj aspoň dvoch hráčov pred vygenerovaním turnaja.');
    return;
  }
  if(state.rounds && !confirm('Turnaj už bol vygenerovaný. Vygenerovať nanovo? Výsledky sa stratia.')) return;
  generateRounds();
});
document.getElementById('resetBtn').addEventListener('click', resetAll);

render();
</script>
</body>
</html>
